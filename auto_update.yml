name: CMACED Daily Update

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  update:
    name: Scrape · Validate · Update
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper (8-layer pipeline)
        run: python scraper/scraper.py
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: scraper

      - name: Run link validator
        run: python scraper/link_validator.py
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: scraper

      - name: Print summary
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path
          o = json.loads(Path('data/opportunities.json').read_text())
          a = json.loads(Path('data/archive.json').read_text())
          print(f'Active: {len(o)} | Archive: {len(a)}')
          by_region = {}
          for x in o:
            r = x.get('region','?')
            by_region[r] = by_region.get(r,0) + 1
          for k,v in by_region.items():
            print(f'  {k}: {v}')
          EOF

      - name: Commit changes
        run: |
          git config user.name  "CMACED Bot"
          git config user.email "cmaced@superior.edu.pk"
          git add data/opportunities.json data/archive.json scraper/validation.log scraper/scraper.log
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
